<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmàcies de Guàrdia - Castelló</title>

<style>

.farmacia-app {
  font-family: system-ui;
  padding: 20px;
   background: #f9fafb;
}

farmacia-h2 {
  margin-bottom: 15px;
}

.farmacia-subtitulo {
  margin-bottom: 20px;
}

.farmacia-ciudad {
  font-weight: 600;
  font-size: 1rem;
  color: #111827;
}

.farmacia-fecha {
  font-size: 0.85rem;
  color: #6b7280;
  text-transform: capitalize;
}

.farmacia-card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}

.farmacia-meta {
  font-size: 0.85rem;
  color: #6b7280;
}

.farmacia-loader {
  text-align: center;
  padding: 20px;
}

.farmacia-tel {
  color: #16a34a;
  text-decoration: none;
  font-weight: 600;
}

.farmacia-tel:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

	<div class="farmacia-app">
		<h2>💊 Farmàcies de guàrdia</h2>
		<!-- <div class="subtitulo"> -->
		  <!-- <div class="ciudad">Castellón de la Plana</div> -->
		  <!-- <div class="fecha"></div> -->
		<!-- </div> -->

		<div id="loader">Carregant...</div>
		<div id="lista"></div>
	</div>

<script>

async function cargar() {
  try {
    //const res = await fetch("/api/farmacias");
	const res = await fetch(
	  "https://farmacias-guardia-castellon.vercel.app/api/farmacias"
	);
  
   const data = await res.json();
	
    //console.log("DATA COMPLETA:", data);
    //console.log("TOTAL FARMACIAS:", data.farmacias?.length);
	//console.log(data.debug);

    loader.style.display = "none";

    // 📅 fecha bonita
    const fecha = new Date(data.fecha);
    const fechaTxt = fecha.toLocaleDateString("es-ES", {
      weekday: "long",
      day: "numeric",
      month: "long"
    });

	//document.querySelector(".fecha").innerText = fechaTxt;

    if (!data.farmacias || !data.farmacias.length) {
      console.warn("SIN FARMACIAS");
      lista.innerHTML = "No hay farmacias disponibles";
      return;
    }

    // 🔍 DEBUG de una farmacia
    //console.log("PRIMER ELEMENTO:", data.farmacias[0]);

    // ❗ IMPORTANTE: sin slice
    lista.innerHTML = data.farmacias.map(f => {
      console.log("RENDER:", f);

      return `
        <div class="farmacia-card">
          <b>${f.nombre || "Farmacia"}</b><br>
          ${f.direccion || ""} ${f.cp ? " - " + f.cp : ""}<br>
		  ${f.poblacion}<br>
          ${f.telefono ? `
            <a href="tel:${f.telefono}" class="tel">
              📞 ${f.telefono}
            </a><br>
          ` : ""}

          <span class="farmacia-meta">${f.horario || "Guardia fins demà"}</span><br>

          ${f.lat ? `
            <a href="https://www.google.com/maps?q=${f.lat},${f.lon}" target="_blank">
              📍 Veure mapa
            </a>
          ` : ""}
        </div>
      `;
    }).join("");

  } catch (err) {
    console.error("ERROR:", err);
    loader.innerText = "Error carregant dades";
  }
}

cargar();
</script>

</body>
</html>
