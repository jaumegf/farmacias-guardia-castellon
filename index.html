<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmacias de Guardia - Castellón</title>

<style>
body {
  font-family: system-ui;
  margin: 0;
  padding: 20px;
  background: #f9fafb;
}

h2 {
  margin-bottom: 15px;
}

.card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}

.meta {
  font-size: 0.85rem;
  color: #6b7280;
}

.loader {
  text-align: center;
  padding: 20px;
}

.tel {
  color: #16a34a;
  text-decoration: none;
  font-weight: 600;
}

.tel:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<h2>💊 Farmacias de guardia</h2>
<div id="subtitulo"></div>

<div id="loader">Cargando...</div>
<div id="lista"></div>

<script>

async function cargar() {
  try {
    const res = await fetch("/api/farmacias");
    const data = await res.json();

    console.log("DATA COMPLETA:", data);
    console.log("TOTAL FARMACIAS:", data.farmacias?.length);

    loader.style.display = "none";

    // 📅 fecha bonita
    const fecha = new Date(data.fecha);
    const fechaTxt = fecha.toLocaleDateString("es-ES", {
      weekday: "long",
      day: "numeric",
      month: "long"
    });

    subtitulo.innerHTML = `
      Castellón de la Plana<br>
      <span class="meta">${fechaTxt}</span>
    `;

    if (!data.farmacias || !data.farmacias.length) {
      console.warn("SIN FARMACIAS");
      lista.innerHTML = "No hay farmacias disponibles";
      return;
    }

    // 🔍 DEBUG de una farmacia
    console.log("PRIMER ELEMENTO:", data.farmacias[0]);

    // ❗ IMPORTANTE: sin slice
    lista.innerHTML = data.farmacias.map(f => {
      console.log("RENDER:", f);

      return `
        <div class="card">
          <b>${f.nombre || "Farmacia"}</b><br>
          ${f.direccion || ""} ${f.cp ? " - " + f.cp : ""}<br>

          ${f.telefono ? `
            <a href="tel:${f.telefono}" class="tel">
              📞 ${f.telefono}
            </a><br>
          ` : ""}

          <span class="meta">${f.horario || "Guardia hoy hasta mañana"}</span><br>

          ${f.lat ? `
            <a href="https://www.google.com/maps?q=${f.lat},${f.lon}" target="_blank">
              📍 Ver mapa
            </a>
          ` : ""}
        </div>
      `;
    }).join("");

  } catch (err) {
    console.error("ERROR:", err);
    loader.innerText = "Error cargando datos";
  }
}

cargar();
</script>

</body>
</html>
